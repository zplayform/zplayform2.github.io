<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard BuyBox - Exemplo Base64</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      color: #0f172a;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .badge {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .product-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .info {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #64748b;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .value {
      font-size: 17px;
      font-weight: 700;
    }

    .value.price {
      color: #15803d;
    }

    .value.installment {
      color: #b45309;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn,
    .btn-secondary {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn {
      background: #2563eb;
      color: #fff;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: min(1100px, 100%);
      max-height: 90vh;
      background: #111827;
      border-radius: 18px;
      padding: 18px;
      overflow: auto;
      position: relative;
    }

    .modal-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: #1e293b;
      color: white;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }

    .modal-image {
      width: 100%;
      height: auto;
      border-radius: 12px;
      margin-top: 12px;
      background: white;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Dashboard BuyBox</div>
    <div class="subtitle">Exemplo com print embutido em Base64 no próprio HTML.</div>

    <div class="grid">
      <article class="card">
        <div class="badge">Mercado Livre</div>

        <div class="product-title">
          Smartphone Motorola Edge 50 Fusion 256GB 8GB RAM
        </div>

        <div class="info">
          <div class="info-box">
            <div class="label">Preço à vista</div>
            <div class="value price">R$2.199,00</div>
          </div>

          <div class="info-box">
            <div class="label">Preço a prazo</div>
            <div class="value installment">10x de R$219,90 sem juros</div>
          </div>

          <div class="info-box">
            <div class="label">Seller BuyBox</div>
            <div class="value">Mercado Livre Eletronicos</div>
          </div>
        </div>

        <div class="actions">
          <a
            class="btn"
            href="https://www.mercadolivre.com.br/"
            target="_blank"
            rel="noopener noreferrer"
          >
            Abrir produto
          </a>

          <button
            class="btn-secondary"
            type="button"
            onclick="abrirPrint('data:image/png;base64,{{SCREENSHOT_BASE64}}')"
          >
            Ver print
          </button>
        </div>
      </article>
    </div>
  </div>

  <div class="modal" id="printModal" onclick="fecharPrint(event)">
    <div class="modal-box">
      <button class="modal-close" type="button" onclick="fecharPrint()">&times;</button>
      <img id="printImagem" class="modal-image" src="" alt="Print do BuyBox">
    </div>
  </div>

  <script>
    function abrirPrint(srcBase64) {
      document.getElementById("printImagem").src = srcBase64;
      document.getElementById("printModal").classList.add("show");
    }

    function fecharPrint(event) {
      if (!event || event.target.id === "printModal") {
        document.getElementById("printModal").classList.remove("show");
        document.getElementById("printImagem").src = "";
      }
    }
  </script>
</body>
</html>
